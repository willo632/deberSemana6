<header class="app-header">
  <div class="hdr-container">

    <!-- ── Brand ───────────────────────────── -->
    <div class="hdr-brand">
      <div class="brand-icon">
        <i class="bi bi-hexagon-fill"></i>
      </div>
      <div class="brand-text">
        <span class="brand-name">NexusERP</span>
        <span class="brand-sub">Sistema Empresarial</span>
      </div>
    </div>

    <!-- ── Global Search ───────────────────── -->
    <div class="hdr-search">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="search" placeholder="Buscar módulo, cliente, orden..." />
        <kbd>⌘K</kbd>
      </div>
    </div>

    <!-- ── Actions ─────────────────────────── -->
    <div class="hdr-actions">

      <!-- Mobile search toggle -->
      <button class="act-btn d-md-none" aria-label="Buscar">
        <i class="bi bi-search"></i>
      </button>

      <!-- Notifications -->
      <div class="dropdown">
        <button class="act-btn" id="notifDrop"
                data-bs-toggle="dropdown" aria-expanded="false"
                aria-label="Notificaciones">
          <i class="bi bi-bell-fill"></i>
          @if (unreadCount() > 0) {
            <span class="notif-dot">{{ unreadCount() }}</span>
          }
        </button>

        <div class="dropdown-menu dropdown-menu-end notif-panel"
             aria-labelledby="notifDrop">
          <div class="np-header">
            <span class="fw-semibold">Notificaciones</span>
            <a href="#" class="np-mark">Marcar todo leído</a>
          </div>

          <div class="np-list">
            @for (n of notifications(); track n.id) {
              <div class="np-item" [class.np-unread]="n.unread">
                <div class="np-icon">
                  <i [class]="'bi ' + n.icon"></i>
                </div>
                <div class="np-body">
                  <p class="np-title">{{ n.title }}</p>
                  <p class="np-desc">{{ n.desc }}</p>
                  <span class="np-time">{{ n.time }}</span>
                </div>
              </div>
            }
          </div>

          <div class="np-footer">
            <a href="#">Ver todas <i class="bi bi-arrow-right ms-1"></i></a>
          </div>
        </div>
      </div>

      <!-- Gear shortcut -->
      <button class="act-btn d-none d-lg-flex" aria-label="Configuración">
        <i class="bi bi-gear-fill"></i>
      </button>

      <div class="hdr-divider d-none d-md-block"></div>

      <!-- User Profile -->
      <div class="dropdown">
        <button class="user-btn" id="userDrop"
                data-bs-toggle="dropdown" aria-expanded="false">
          <div class="user-av">{{ initials() }}</div>
          <div class="user-info d-none d-lg-block">
            <span class="u-name">{{ nombreCompleto() }}</span>
            <span class="u-role">Administrador</span>
          </div>
          <i class="bi bi-chevron-down u-chev d-none d-lg-block"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-end user-menu"
            aria-labelledby="userDrop">
          <li>
            <div class="um-profile">
              <div class="user-av user-av-lg">{{ initials() }}</div>
              <div>
                <div class="fw-semibold" style="font-size:.875rem">{{ nombreCompleto() }}</div>
                <div class="text-muted" style="font-size:.75rem">Sesión activa</div>
              </div>
            </div>
          </li>
          <li><hr class="dropdown-divider my-1"></li>
          <li>
            <a class="dropdown-item" href="#">
              <i class="bi bi-person-fill me-2 text-primary"></i>Mi Perfil
            </a>
          </li>
          <li>
            <a class="dropdown-item" href="#">
              <i class="bi bi-shield-check me-2 text-success"></i>Seguridad
            </a>
          </li>
          <li>
            <a class="dropdown-item" href="#">
              <i class="bi bi-gear-fill me-2 text-secondary"></i>Configuración
            </a>
          </li>
          <li><hr class="dropdown-divider my-1"></li>
          <li>
            <button class="dropdown-item text-danger" (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
            </button>
          </li>
        </ul>
      </div>

    </div>
  </div>
</header>
